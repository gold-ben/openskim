<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" fill="#f5f0eb"/>
  
  <!-- Water waves (simplified) -->
  <path d="M 600 350 Q 650 340 700 350" stroke="#7ba3c0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 610 365 Q 660 355 710 365" stroke="#5a8aa3" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 620 375 Q 670 370 720 375" stroke="#4a7a93" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Horizontal line -->
  <line x1="100" y1="380" x2="900" y2="380" stroke="#333" stroke-width="4"/>
  
  <!-- Owl body -->
  <ellipse cx="350" cy="280" rx="90" ry="120" fill="#8b7355"/>
  
  <!-- Owl chest (lighter) -->
  <ellipse cx="350" cy="300" rx="70" ry="100" fill="#c9b895"/>
  
  <!-- Left wing -->
  <path d="M 280 260 Q 200 220 180 300 Q 190 320 280 280" fill="#6b5a4a" stroke="#333" stroke-width="3"/>
  
  <!-- Right wing (raised) -->
  <path d="M 420 240 Q 520 150 580 220 Q 560 260 450 280" fill="#6b5a4a" stroke="#333" stroke-width="3"/>
  
  <!-- Wing feathers (right) -->
  <g stroke="#333" stroke-width="2" fill="none">
    <path d="M 480 160 Q 500 140 510 180"/>
    <path d="M 510 150 Q 535 125 545 170"/>
    <path d="M 540 155 Q 570 130 575 185"/>
  </g>
  
  <!-- Head -->
  <circle cx="350" cy="200" r="70" fill="#8b7355"/>
  
  <!-- Face (white part) -->
  <ellipse cx="350" cy="210" rx="55" ry="65" fill="#f0ebe5"/>
  
  <!-- Left eye white -->
  <circle cx="320" cy="190" r="22" fill="white"/>
  <!-- Left eye iris -->
  <circle cx="320" cy="190" r="16" fill="#3d3d3d"/>
  <!-- Left eye pupil -->
  <circle cx="322" cy="188" r="10" fill="black"/>
  <!-- Left eye shine -->
  <circle cx="325" cy="185" r="4" fill="white"/>
  
  <!-- Right eye white -->
  <circle cx="380" cy="190" r="22" fill="white"/>
  <!-- Right eye iris -->
  <circle cx="380" cy="190" r="16" fill="#3d3d3d"/>
  <!-- Right eye pupil -->
  <circle cx="378" cy="188" r="10" fill="black"/>
  <!-- Right eye shine -->
  <circle cx="375" cy="185" r="4" fill="white"/>
  
  <!-- Beak/nose -->
  <polygon points="350,220 340,235 360,235" fill="#6b5a4a"/>
  
  <!-- Facial disc markings -->
  <circle cx="350" cy="210" r="55" fill="none" stroke="#8b7355" stroke-width="6" opacity="0.3"/>
</svg>
